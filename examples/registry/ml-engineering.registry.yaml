- id: ml.sklearn-modeling
  title: Scikit-learn Modeling and Evaluation
  domain: machine_learning
  instruction_file: instructions/sklearn-modeling.md
  tags:
  - sklearn
  - cross-validation
  - metrics
  invocation:
    type: function
    function:
      name: sklearn_model_selection_cross_validate
      description: Primary schema follows cross_validate. Train/test split and grid
        search argument examples are included for common modeling flows.
      parameters:
        type: object
        required:
        - estimator
        - X
        - y
        properties:
          estimator:
            type: string
            description: Estimator instance expression, e.g. Pipeline(...)
          X:
            type: string
            description: Feature matrix variable name
          y:
            type: string
            description: Target vector variable name
          groups:
            type: string
          scoring:
            oneOf:
            - type: string
            - type: array
              items:
                type: string
            - type: object
          cv:
            oneOf:
            - type: integer
              minimum: 2
            - type: object
          n_jobs:
            type: integer
          verbose:
            type: integer
            minimum: 0
          params:
            type: object
          pre_dispatch:
            oneOf:
            - type: integer
            - type: string
          return_train_score:
            type: boolean
          return_estimator:
            type: boolean
          return_indices:
            type: boolean
          error_score:
            oneOf:
            - type: number
            - type: string
        additionalProperties: false
      strict: false
- id: ml.sklearn-pipeline-ops
  title: Scikit-learn Pipeline Ops
  domain: machine_learning
  instruction_file: instructions/sklearn-pipeline-ops.md
  tags:
  - sklearn
  - pipeline
  - model-ops
  invocation:
    type: function
    function:
      name: sklearn_pipeline_Pipeline
      description: Pipeline schema models init/persist/calibration arguments used
        in production packaging flows.
      parameters:
        type: object
        required:
        - steps
        properties:
          steps:
            type: array
            minItems: 1
            items:
              type: object
              required:
              - name
              - estimator
              properties:
                name:
                  type: string
                estimator:
                  type: string
              additionalProperties: false
          memory:
            oneOf:
            - type: string
            - type: 'null'
          verbose:
            type: boolean
          calibration_method:
            type: string
            enum:
            - sigmoid
            - isotonic
          calibration_cv:
            oneOf:
            - type: integer
              minimum: 2
            - type: object
            - type: 'null'
          calibration_n_jobs:
            type: integer
          calibration_ensemble:
            oneOf:
            - type: boolean
            - type: string
              enum:
              - auto
          persist_path:
            type: string
          persist_compress:
            oneOf:
            - type: integer
              minimum: 0
              maximum: 9
            - type: boolean
          persist_protocol:
            oneOf:
            - type: integer
            - type: 'null'
        additionalProperties: false
      strict: false
