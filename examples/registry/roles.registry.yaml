tools:
- id: role.data-analyst
  title: Data Analyst Role Orchestrator
  domain: role_orchestrator
  instruction_file: roles/data-analyst.md
  description: Role expert that orchestrates profiling, cleaning, EDA, baseline modeling,
    and visualization for tabular analytics tasks.
  tags:
  - role
  - data-analyst
  - analytics
  - eda
  invocation:
    type: function
    function:
      name: role_data-analyst
      description: Role expert that orchestrates profiling, cleaning, EDA, baseline
        modeling, and visualization for tabular analytics tasks.
      parameters:
        type: object
        properties:
          task:
            type: string
            description: tabular dataset and analysis objective
          context:
            type: object
            description: target metric, business context, and prediction requirement
        required:
        - task
        additionalProperties: true
      strict: false
- id: role.financial-analyst
  title: Financial Analyst Role Orchestrator
  domain: role_orchestrator
  instruction_file: roles/financial-analyst.md
  description: Role expert for financial KPI analysis, scenario modeling, forecasting,
    and risk-aware recommendations.
  tags:
  - role
  - financial-analyst
  - finance
  - forecasting
  invocation:
    type: function
    function:
      name: role_financial-analyst_execute
      description: Role-level orchestration contract that routes into dependent cards;
        fields represent execution intent rather than one library API signature.
      parameters:
        type: object
        required:
        - question
        - dataset_ref
        - target_metric
        properties:
          question:
            type: string
          dataset_ref:
            type: string
            description: Path, table, or URI for the primary financial dataset
          target_metric:
            type: string
          time_column:
            type: string
          forecast_horizon_periods:
            type: integer
            minimum: 1
          frequency:
            type: string
            enum:
            - daily
            - weekly
            - monthly
            - quarterly
            - annual
          scenario_assumptions:
            type: object
          risk_tolerance:
            type: string
            enum:
            - low
            - medium
            - high
          valuation_mode:
            type: string
            enum:
            - dcf
            - multiples
            - blended
            - none
          include_visuals:
            type: boolean
          output_format:
            type: string
            enum:
            - markdown
            - json
            - notebook
        additionalProperties: false
      strict: false
